<!DOCTYPE html>
<html lang="de">
  {% include head.html %}

    <body>
    {% include menu.html %}
    {{ content }}
    {% include svg-defs.html %}
    {% include footer.html %}
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const button = document.getElementById('dark-mode-toggle');
        const icon = button?.querySelector('use');
        if (!button || !icon) return;

        const setTheme = (isDark) => {
          document.body.classList.toggle('dark-mode', isDark);
          icon.setAttribute('href', isDark ? '#icon-sun' : '#icon-moon');
        };

        const mediaQuery =
          window.matchMedia('(prefers-color-scheme: dark)');

        const storedTheme = localStorage.getItem('theme');

        if (storedTheme) {
          setTheme(storedTheme === 'dark');
        } else {
          setTheme(mediaQuery.matches);
        }

        // live change to browser settings
        mediaQuery.addEventListener('change', (e) => {
          if (!localStorage.getItem('theme')) {
            setTheme(e.matches);
          }
        });

        button.addEventListener('click', () => {
          const isDark = !document.body.classList.contains('dark-mode');
          setTheme(isDark);
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
      });

      function init() {
        var imgDefer = document.getElementsByTagName('img');
        for (var i=0; i<imgDefer.length; i++) {
          if(imgDefer[i].getAttribute('data-src')) {
            imgDefer[i].setAttribute('src',imgDefer[i].getAttribute('data-src'));
          } 
        } 
      }
      window.onload = init;

      // Fade in background image once loaded
      (() => {
        const masthead = document.querySelector('.masthead');
        if (masthead == null) return;

        const image = new Image();
        image.onload = () => {
          masthead.classList.add('masthead--loaded');
        };
        image.src = '/img/bg_4_g.jpg';

        if (image.complete) {
          // Image was already cached, (onLoad may not fire)
          masthead.classList.add('masthead--loaded');
        }
      })();
    </script>
    </body>
</html>
